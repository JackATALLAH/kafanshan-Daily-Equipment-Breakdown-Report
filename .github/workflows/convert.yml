permissions:
  contents: write
  
name: Convert Excel to PDF

on:
  push:
    paths:
      - 'excel/*.xlsx'

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install LibreOffice
        run: sudo apt-get update && sudo apt-get install -y libreoffice

      - name: Convert Excel to PDF (force fit to width)
        run: |
          # 1️⃣ Ensure folders exist
          mkdir -p lo_profile
          mkdir -p pdf
      
          # 2️⃣ Create LibreOffice config to force scaling
          cat > lo_profile/registrymodifications.xcu << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <oor:items xmlns:oor="http://openoffice.org/2001/registry">
            <item oor:path="/org.openoffice.Office.Calc/Print">
              <prop oor:name="ScaleToPagesX" oor:op="fuse">
                <value>1</value>
              </prop>
              <prop oor:name="ScaleToPagesY" oor:op="fuse">
                <value>0</value>
              </prop>
            </item>
          </oor:items>
          EOF
      
          # 3️⃣ Convert all Excel files safely (handles spaces)
          find excel -name "*.xlsx" -print0 | while IFS= read -r -d '' file; do
            echo "Converting: $file"
            libreoffice --headless \
              -env:UserInstallation=file://$(pwd)/lo_profile \
              --convert-to pdf \
              --outdir pdf \
              "$file"
          done
      
          # 4️⃣ Debug: list PDFs
          echo "PDFs created:"
          ls -lh pdf

      - name: Commit PDFs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
      
          git add pdf/
          git diff --cached --quiet || git commit -m "Auto convert Excel to PDF"
      
          # Fetch latest changes from remote
          git fetch origin main
      
          # Merge remote changes
          git reset --soft origin/main
      
          # Push with token authentication
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main
