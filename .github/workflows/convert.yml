name: Convert Excel to PDF

on:
  push:
    paths:
      - 'excel/*.xlsx'

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4 # Updated to v4 for better performance
        with:
          fetch-depth: 0 # Ensures we have history to push back

      - name: Install LibreOffice
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice-calc libreoffice-java-common

      - name: Convert Excel to PDF (Force Fit to Width)
        run: |
          mkdir -p pdf
          
          for file in excel/*.xlsx; do
            [ -e "$file" ] || continue
            echo "Converting: $file"
            
            # This specific command forces 'SinglePageSheets' 
            # It makes all columns fit by expanding the virtual page size
            libreoffice --headless \
              --convert-to 'pdf:calc_pdf_Export:{"SinglePageSheets":{"type":"boolean","value":"true"}}' \
              --outdir pdf \
              "$file"
          done

      - name: Commit and Push PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add pdf/*.pdf
          
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-convert Excel to PDF [skip ci]"
            # Standard push works because checkout@v4 handles the token
            git push origin HEAD:${{ github.ref }}
          fi
